name: Fetch GPU pricing daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests boto3

      - name: Fetch pricing
        run: python fetch_gpu_pricing.py
        env:
          GCP_API_KEY: ${{ secrets.GCP_API_KEY }}
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add gpu_pricing.json gpu_pricing_raw.csv gpu_pricing_comparison.csv
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Daily pricing refresh $(date -u +%Y-%m-%d)"
          git push origin main